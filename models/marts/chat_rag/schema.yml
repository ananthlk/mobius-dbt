# Chat-server mart: published RAG embeddings
# Contract: CONTRACT_DBT_RAG.md Section 3. Output for sync → chat server vector DB + PostgreSQL.

version: 2

models:
  - name: published_rag_embeddings
    description: "One row per published embedding (chunk or fact). Source: landing_rag.rag_published_embeddings. Sync reads this table and loads vectors into chat server vector DB (e.g. Vertest) and metadata into chat server PostgreSQL."
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: string
        description: Primary key (from chunk_embedding.id). UUID as string.
        constraints:
          - type: not_null
      - name: document_id
        data_type: string
        description: Document this row belongs to. UUID as string.
        constraints:
          - type: not_null
      - name: source_type
        data_type: string
        description: "hierarchical (chunk) or fact."
        constraints:
          - type: not_null
      - name: source_id
        data_type: string
        description: hierarchical_chunks.id or extracted_facts.id. UUID as string.
        constraints:
          - type: not_null
      - name: embedding
        data_type: "ARRAY<FLOAT64>"
        description: Embedding vector; 1536 floats. For sync to vector DB.
      - name: model
        data_type: string
        description: Embedding model (e.g. text-embedding-3-small). Empty string if unknown.
      - name: created_at
        data_type: timestamp
        description: When the embedding was created.
        constraints:
          - type: not_null
      - name: text
        data_type: string
        description: The text that was embedded (chunk or fact text). Never null; empty string if none.
      - name: page_number
        data_type: int64
        description: Source page (0 when not applicable).
      - name: paragraph_index
        data_type: int64
        description: Paragraph index within page (0 when not applicable).
      - name: section_path
        data_type: string
        description: "e.g. Section 3.2. Empty string when not applicable."
      - name: chapter_path
        data_type: string
        description: "e.g. Chapter 5. Empty string when not applicable."
      - name: summary
        data_type: string
        description: Chunk summary (hierarchical); for facts use empty string or fact_text.
      - name: document_filename
        data_type: string
        description: documents.filename.
      - name: document_display_name
        data_type: string
        description: documents.display_name. Empty string if null.
      - name: document_authority_level
        data_type: string
        description: documents.authority_level. Empty string if null.
      - name: document_effective_date
        data_type: string
        description: documents.effective_date. Empty string if null.
      - name: document_termination_date
        data_type: string
        description: documents.termination_date. Empty string if null.
      - name: document_payer
        data_type: string
        description: documents.payer. Empty string if null.
      - name: document_state
        data_type: string
        description: documents.state. Empty string if null.
      - name: document_program
        data_type: string
        description: documents.program. Empty string if null.
      - name: document_status
        data_type: string
        description: documents.status.
      - name: document_created_at
        data_type: timestamp
        description: documents.created_at.
      - name: document_review_status
        data_type: string
        description: documents.review_status.
      - name: document_reviewed_at
        data_type: timestamp
        description: When document was last reviewed (null if not tracked).
      - name: document_reviewed_by
        data_type: string
        description: Reviewer identifier (empty string or null if not tracked).
      - name: content_sha
        data_type: string
        description: SHA-256 hex of canonical content. For change detection and idempotent sync.
        constraints:
          - type: not_null
      - name: updated_at
        data_type: timestamp
        description: Last update time (publish time).
        constraints:
          - type: not_null
      - name: source_verification_status
        data_type: string
        description: "For facts: extracted_facts.verification_status; for chunks: n/a or empty."
    tests:
      - unique:
          column_name: id
      - not_null:
          column_name: id
      - not_null:
          column_name: document_id
      - not_null:
          column_name: source_type
      - not_null:
          column_name: source_id
      - not_null:
          column_name: created_at
      - not_null:
          column_name: content_sha
      - not_null:
          column_name: updated_at

  - name: llm_calls
    description: "One row per LLM call. Source: stg_llm_calls. For per-call analytics and quality-by-config-version."
    config:
      contract:
        enforced: true
    columns:
      - name: call_id
        data_type: string
        constraints: [{ type: not_null }]
      - name: correlation_id
        data_type: string
      - name: thread_id
        data_type: string
      - name: ts
        data_type: timestamp
        constraints: [{ type: not_null }]
      - name: config_sha
        data_type: string
      - name: model
        data_type: string
        constraints: [{ type: not_null }]
      - name: provider
        data_type: string
        constraints: [{ type: not_null }]
      - name: stage
        data_type: string
        constraints: [{ type: not_null }]
      - name: tier
        data_type: string
      - name: complexity
        data_type: string
      - name: is_ab_call
        data_type: boolean
      - name: ab_variant
        data_type: string
      - name: success
        data_type: boolean
        constraints: [{ type: not_null }]
      - name: is_rate_limit
        data_type: boolean
      - name: is_fallback
        data_type: boolean
      - name: fallback_from
        data_type: string
      - name: completion_valid
        data_type: boolean
      - name: error_type
        data_type: string
      - name: latency_ms
        data_type: int64
      - name: input_tokens
        data_type: int64
      - name: output_tokens
        data_type: int64
      - name: total_tokens
        data_type: int64
      - name: cost_usd
        data_type: float64
      - name: quality_score
        data_type: float64
      - name: quality_source
        data_type: string
      - name: phi_detected
        data_type: boolean
      - name: phi_scrubbed
        data_type: boolean
      - name: phi_types
        data_type: string
      - name: prompt_len_chars
        data_type: int64
      - name: output_len_chars
        data_type: int64
      - name: prompt_hash
        data_type: string
    tests:
      - unique: { column_name: call_id }
      - not_null: { column_name: call_id }
      - not_null: { column_name: ts }
      - not_null: { column_name: model }
      - not_null: { column_name: provider }
      - not_null: { column_name: stage }
      - accepted_values:
          column_name: stage
          values: ['planner', 'parser', 'responder', 'tool_agent', 'other']
      - accepted_values:
          column_name: provider
          values: ['vertex', 'ollama']

  - name: llm_config_versions
    description: "One row per prompts+LLM config version. Source: stg_llm_config_versions."
    config:
      contract:
        enforced: true
    columns:
      - name: config_sha
        data_type: string
        constraints: [{ type: not_null }]
      - name: config_json
        data_type: string
        constraints: [{ type: not_null }]
      - name: created_at
        data_type: timestamp
        constraints: [{ type: not_null }]
      - name: created_by
        data_type: string
      - name: notes
        data_type: string
      - name: model
        data_type: string
      - name: provider
        data_type: string
      - name: prompt_count
        data_type: int64
    tests:
      - unique: { column_name: config_sha }
      - not_null: { column_name: config_sha }
      - not_null: { column_name: created_at }

  - name: phi_audit_log
    description: "HIPAA PHI audit trail. Source: stg_phi_audit_log."
    config:
      contract:
        enforced: true
    columns:
      - name: event_id
        data_type: string
        constraints: [{ type: not_null }]
      - name: ts
        data_type: timestamp
        constraints: [{ type: not_null }]
      - name: correlation_id
        data_type: string
      - name: thread_id
        data_type: string
      - name: event_type
        data_type: string
        constraints: [{ type: not_null }]
      - name: phi_types
        data_type: string
      - name: phi_count
        data_type: int64
      - name: stage
        data_type: string
      - name: model_used
        data_type: string
      - name: action_taken
        data_type: string
        constraints: [{ type: not_null }]
      - name: hipaa_mode_active
        data_type: boolean
      - name: baa_available
        data_type: boolean
    tests:
      - unique: { column_name: event_id }
      - not_null: { column_name: event_id }
      - not_null: { column_name: ts }
      - not_null: { column_name: action_taken }
