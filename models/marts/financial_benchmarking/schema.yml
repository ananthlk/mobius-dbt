        constraints: [{ type: not_null }]
      - name: n_org_months
        data_type: int64
        constraints: [{ type: not_null }]
      - name: n_orgs
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_paid
        data_type: float64
        constraints: [{ type: not_null }]
      - name: p25
        data_type: float64
      - name: p50
        data_type: float64
      - name: p75
        data_type: float64
      - name: iqr
        data_type: float64
      - name: iqr_p50_ratio
        data_type: float64
      - name: recommendation
        data_type: string
        constraints: [{ type: not_null }]
      - name: p25_payment_per_claim
        data_type: float64
      - name: p50_payment_per_claim
        data_type: float64
      - name: p75_payment_per_claim
        data_type: float64
      - name: p25_revenue_per_bene
        data_type: float64
      - name: p50_revenue_per_bene
        data_type: float64
      - name: p75_revenue_per_bene
        data_type: float64
      - name: p25_claims_per_bene
        data_type: float64
      - name: p50_claims_per_bene
        data_type: float64
      - name: p75_claims_per_bene
        data_type: float64
      - name: p25_bene_per_clinician
        data_type: float64
      - name: p50_bene_per_clinician
        data_type: float64
      - name: p75_bene_per_clinician
        data_type: float64
      - name: code_flag
        data_type: string
        constraints: [{ type: not_null }]
      - name: is_bimodal
        data_type: bool
        constraints: [{ type: not_null }]
      - name: svc_npi_count
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_claims
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_beneficiaries
        data_type: int64
        constraints: [{ type: not_null }]
    tests:
      - unique:
          column_name: "hcpcs_code || '|' || peer_group || '|' || coalesce(dimension_value, '__null__')"
      - not_null: { column_name: hcpcs_code }
      - not_null: { column_name: peer_group }
      - accepted_values:
          column_name: benchmark_status
          values: ['usable', 'usable_bimodal', 'usable_wide', 'add_on', 'add_on_thin', 'thin', 'unusable', 'no_data']
      - accepted_values:
          column_name: confidence
          values: ['high', 'moderate', 'low', 'none']
