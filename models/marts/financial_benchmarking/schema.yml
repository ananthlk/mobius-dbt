  - name: hcpcs_rate_benchmarks_v2
    description: >
      HCPCS-level payment benchmarks (P25/P50/P75) for FL Medicaid — v2.
      Uses credentialing-deduped org identity (org_npi_map, 1,474 orgs).
      MONTHLY grain: each org × code × month is one observation for percentiles.
      This fixes RPB (benes are unique per month, can't sum across months)
      and gives more N for tighter distributions.
    config:
      contract:
        enforced: true
    columns:
      - name: hcpcs_code
        data_type: string
        constraints: [{ type: not_null }]
      - name: service_line
        data_type: string
        constraints: [{ type: not_null }]
      - name: peer_group
        data_type: string
        constraints: [{ type: not_null }]
      - name: dimension_value
        data_type: string
      - name: geo_level
        data_type: string
        constraints: [{ type: not_null }]
      - name: geo_id
        data_type: string
        constraints: [{ type: not_null }]
      - name: period_year
        data_type: string
        constraints: [{ type: not_null }]
      - name: n_org_months
        data_type: int64
        description: "Number of org-month observations used for percentile computation."
        constraints: [{ type: not_null }]
      - name: org_count
        data_type: int64
        description: "Distinct orgs contributing to this cell."
        constraints: [{ type: not_null }]
      - name: svc_npi_count
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_claims
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_paid
        data_type: float64
        constraints: [{ type: not_null }]
      - name: total_beneficiaries
        data_type: int64
        constraints: [{ type: not_null }]
      - name: p25_payment_per_claim
        data_type: float64
      - name: p50_payment_per_claim
        data_type: float64
      - name: p75_payment_per_claim
        data_type: float64
      - name: p25_revenue_per_bene
        data_type: float64
      - name: p50_revenue_per_bene
        data_type: float64
      - name: p75_revenue_per_bene
        data_type: float64
      - name: p25_claims_per_bene
        data_type: float64
      - name: p50_claims_per_bene
        data_type: float64
      - name: p75_claims_per_bene
        data_type: float64
      - name: p25_bene_per_clinician
        data_type: float64
      - name: p50_bene_per_clinician
        data_type: float64
      - name: p75_bene_per_clinician
        data_type: float64
    tests:
      - not_null: { column_name: hcpcs_code }
      - not_null: { column_name: peer_group }
      - accepted_values:
          column_name: peer_group
          values: ['all_fl', 'by_entity', 'by_org_type', 'by_size', 'by_market', 'by_taxonomy', 'rest_of_fl_excl']
      - accepted_values:
          column_name: geo_level
          values: ['state']

  - name: hcpcs_benchmark_assessment
    description: >
      Assessed HCPCS benchmark table — one row per BH code × peer_group × dimension_value.
      Joins fl_bh_code_reference with hcpcs_rate_benchmarks_v2 (monthly grain),
      applies assessment rules to classify benchmark quality for every dimension cut.
      All logic in SQL — consumers just SELECT with WHERE peer_group/dimension_value filters.
    config:
      contract:
        enforced: true
    columns:
      - name: hcpcs_code
        data_type: string
        constraints: [{ type: not_null }]
      - name: description
        data_type: string
      - name: ahca_category
        data_type: string
        constraints: [{ type: not_null }]
      - name: primary_metric
        data_type: string
        constraints: [{ type: not_null }]
      - name: peer_group
        data_type: string
        constraints: [{ type: not_null }]
      - name: dimension_value
        data_type: string
      - name: unit
        data_type: string
        constraints: [{ type: not_null }]
      - name: benchmark_status
        data_type: string
        constraints: [{ type: not_null }]
      - name: confidence
        data_type: string
        constraints: [{ type: not_null }]
      - name: n_org_months
        data_type: int64
        constraints: [{ type: not_null }]
      - name: n_orgs
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_paid
        data_type: float64
        constraints: [{ type: not_null }]
      - name: p25
        data_type: float64
      - name: p50
        data_type: float64
      - name: p75
        data_type: float64
      - name: iqr
        data_type: float64
      - name: iqr_p50_ratio
        data_type: float64
      - name: recommendation
        data_type: string
        constraints: [{ type: not_null }]
      - name: p25_payment_per_claim
        data_type: float64
      - name: p50_payment_per_claim
        data_type: float64
      - name: p75_payment_per_claim
        data_type: float64
      - name: p25_revenue_per_bene
        data_type: float64
      - name: p50_revenue_per_bene
        data_type: float64
      - name: p75_revenue_per_bene
        data_type: float64
      - name: p25_claims_per_bene
        data_type: float64
      - name: p50_claims_per_bene
        data_type: float64
      - name: p75_claims_per_bene
        data_type: float64
      - name: p25_bene_per_clinician
        data_type: float64
      - name: p50_bene_per_clinician
        data_type: float64
      - name: p75_bene_per_clinician
        data_type: float64
      - name: code_flag
        data_type: string
        constraints: [{ type: not_null }]
      - name: is_bimodal
        data_type: bool
        constraints: [{ type: not_null }]
      - name: svc_npi_count
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_claims
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_beneficiaries
        data_type: int64
        constraints: [{ type: not_null }]
    tests:
      - unique:
          column_name: "hcpcs_code || '|' || peer_group || '|' || coalesce(dimension_value, '__null__')"
      - not_null: { column_name: hcpcs_code }
      - not_null: { column_name: peer_group }
      - accepted_values:
          column_name: benchmark_status
          values: ['usable', 'usable_bimodal', 'usable_wide', 'add_on', 'add_on_thin', 'thin', 'unusable', 'no_data']
      - accepted_values:
          column_name: confidence
          values: ['high', 'moderate', 'low', 'none']

  - name: fl_bh_code_reference_enriched
    description: >
      Thin enrichment over BQ source `fl_bh_code_reference`. Adds a
      `care_stage` column (intake / high_acuity / ongoing_treatment) so
      downstream marts can join to a single source of truth instead of
      re-inlining the CASE statement. Grain: one row per hcpcs_code.
    columns:
      - name: hcpcs_code
        description: HCPCS/CPT procedure code
      - name: description
        description: Human-readable description
      - name: ahca_category
        description: AHCA service category from source
      - name: service_line
        description: Alias for ahca_category, used by benchmarking marts
      - name: care_stage
        description: "Clinical journey stage: intake, high_acuity, or ongoing_treatment"
    tests:
      - unique: { column_name: hcpcs_code }
      - not_null: { column_name: hcpcs_code }
      - not_null: { column_name: care_stage }
      - accepted_values:
          column_name: care_stage
          values: ['intake', 'high_acuity', 'ongoing_treatment']

  - name: org_care_stage_profile_v2
    description: >
      Long-format care-stage profile per org-year. Unpivots the
      intake_/high_acuity_/ongoing_ columns from org_kpis_v2 into one row
      per (org_slug, period_year, care_stage). Enables endpoints to filter
      by care_stage instead of picking specific columns.
    columns:
      - name: org_slug
        description: Credentialing-deduped org identity
      - name: period_year
        description: "Year string (e.g. '2024')"
      - name: care_stage
        description: "intake / high_acuity / ongoing_treatment"
      - name: total_paid
        description: Dollars attributed to this care_stage for this org-year
      - name: total_claims
        description: Claim count for this care_stage
      - name: total_benes
        description: Unique beneficiary count for this care_stage
      - name: revenue_pct
        description: Share of this org-year's paid in this stage (0..1)
      - name: bene_pct
        description: Share of this org-year's benes in this stage (0..1)
      - name: local_market_share
        description: Org's stage_paid / total stage_paid in same ZIP
      - name: payment_per_claim
        description: Pooled Σpaid/Σclaims at (org, stage, year)
      - name: claims_per_bene
        description: Pooled Σclaims/Σbenes at (org, stage, year)
      - name: revenue_per_bene
        description: Pooled Σpaid/Σbenes at (org, stage, year)
      - name: org_type
        description: Classification (CMHC, FQHC, SUD, etc.) carried from org_kpis_v2
      - name: size_band
      - name: market_tier
      - name: panel_size
      - name: total_paid_all_stages
        description: Org-year total across all stages (for share math)
    tests:
      - unique:
          column_name: "org_slug || '|' || period_year || '|' || care_stage"
      - not_null: { column_name: org_slug }
      - not_null: { column_name: period_year }
      - not_null: { column_name: care_stage }
      - accepted_values:
          column_name: care_stage
          values: ['intake', 'high_acuity', 'ongoing_treatment']

  - name: care_stage_rate_benchmarks
    description: >
      Care-stage-level rate benchmarks (P25/P50/P75) for FL Medicaid, 2024.
      One org contributes one rate per stage (pooled across all codes in the
      stage). Percentiles computed across orgs within each peer group.
      Parallel peer groups: all_fl, by_entity, by_org_type, by_size, by_market,
      by_taxonomy, rest_of_fl_excl. 4 KPIs: payment_per_claim,
      revenue_per_bene, claims_per_bene, bene_per_clinician.
    columns:
      - name: care_stage
      - name: peer_group
      - name: dimension_value
        description: Value within the peer_group axis (e.g. 'CMHC' for by_org_type)
      - name: geo_level
      - name: geo_id
      - name: period_year
      - name: org_count
      - name: svc_npi_count
      - name: total_claims
      - name: total_paid
      - name: total_beneficiaries
      - name: p25_payment_per_claim
      - name: p50_payment_per_claim
      - name: p75_payment_per_claim
      - name: p25_revenue_per_bene
      - name: p50_revenue_per_bene
      - name: p75_revenue_per_bene
      - name: p25_claims_per_bene
      - name: p50_claims_per_bene
      - name: p75_claims_per_bene
      - name: p25_bene_per_clinician
      - name: p50_bene_per_clinician
      - name: p75_bene_per_clinician
    tests:
      - unique:
          column_name: "care_stage || '|' || peer_group || '|' || coalesce(dimension_value, '__null__') || '|' || period_year"
      - not_null: { column_name: care_stage }
      - not_null: { column_name: peer_group }
      - accepted_values:
          column_name: care_stage
          values: ['intake', 'high_acuity', 'ongoing_treatment']
      - accepted_values:
          column_name: peer_group
          values: ['all_fl', 'by_entity', 'by_org_type', 'by_size', 'by_market', 'by_taxonomy', 'rest_of_fl_excl']

  - name: care_stage_rate_trends
    description: >
      Monthly care-stage KPI trends (2019–2024) for FL Medicaid. P50 only.
      Same peer-group taxonomy as care_stage_rate_benchmarks plus
      rest_of_fl_excl for sector comparisons. Grain: care_stage ×
      period_month × peer_group × dimension_value.
    columns:
      - name: care_stage
      - name: period_month
      - name: peer_group
      - name: dimension_value
      - name: org_count
      - name: svc_npi_count
      - name: total_claims
      - name: total_paid
      - name: total_beneficiaries
      - name: p50_payment_per_claim
      - name: p50_revenue_per_bene
      - name: p50_claims_per_bene
      - name: p50_bene_per_clinician
    tests:
      - unique:
          column_name: "care_stage || '|' || period_month || '|' || peer_group || '|' || coalesce(dimension_value, '__null__')"
      - not_null: { column_name: care_stage }
      - not_null: { column_name: period_month }
      - not_null: { column_name: peer_group }
      - accepted_values:
          column_name: care_stage
          values: ['intake', 'high_acuity', 'ongoing_treatment']
      - accepted_values:
          column_name: peer_group
          values: ['all_fl', 'by_entity', 'by_org_type', 'by_size', 'by_market', 'by_taxonomy', 'rest_of_fl_excl']

  - name: entity_panel_commitment
    description: >
      Panel commitment index by entity type × year.
      Measures how consistently clinicians bill Medicaid month-over-month
      vs the FL BH market average. One stg_doge scan filtered to ~2,691
      known billing NPIs. 48 rows total.
    columns:
      - name: entity_key
        description: "bhpf | fbha | lookalike | fqhc | community_bh | bh_specialty | sud | community"
      - name: period_year
        description: "Calendar year (2019–2024)"
      - name: retention_pct
        description: "Avg % of entity clinicians billing Medicaid in month m+1 given they billed in m"
      - name: avg_npis
        description: "Average active servicing NPIs per month for this entity"
      - name: mkt_retention_pct
        description: "Same retention metric across all FL BH entities (market baseline)"
      - name: commitment_index
        description: "retention_pct / mkt_retention_pct. >1 = more Medicaid-committed than market"
    tests:
      - unique:
          column_name: "entity_key || '|' || cast(period_year as string)"
      - not_null: { column_name: entity_key }
      - not_null: { column_name: period_year }
