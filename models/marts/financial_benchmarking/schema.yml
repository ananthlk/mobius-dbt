  - name: hcpcs_benchmark_assessment
    description: >
      Assessed HCPCS benchmark table — one row per BH code × peer_group × dimension_value.
      Joins fl_bh_code_reference with hcpcs_rate_benchmarks_v2 (monthly grain),
      applies assessment rules to classify benchmark quality for every dimension cut.
      All logic in SQL — consumers just SELECT with WHERE peer_group/dimension_value filters.
    config:
      contract:
        enforced: true
    columns:
      - name: hcpcs_code
        data_type: string
        constraints: [{ type: not_null }]
      - name: description
        data_type: string
      - name: ahca_category
        data_type: string
        constraints: [{ type: not_null }]
      - name: primary_metric
        data_type: string
        constraints: [{ type: not_null }]
      - name: peer_group
        data_type: string
        constraints: [{ type: not_null }]
      - name: dimension_value
        data_type: string
      - name: unit
        data_type: string
        constraints: [{ type: not_null }]
      - name: benchmark_status
        data_type: string
        constraints: [{ type: not_null }]
      - name: confidence
