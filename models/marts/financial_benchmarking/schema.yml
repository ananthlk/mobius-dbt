        data_type: float64
      - name: intake_claims
        data_type: int64
      - name: high_acuity_claims
        data_type: int64
      - name: ongoing_claims
        data_type: int64
      - name: intake_benes
        data_type: int64
      - name: high_acuity_benes
        data_type: int64
      - name: ongoing_benes
        data_type: int64
      - name: market_share_pct
        data_type: float64
      - name: intake_market_share
        data_type: float64
      - name: high_acuity_market_share
        data_type: float64
      - name: ongoing_market_share
        data_type: float64
      - name: intake_revenue_pct
        data_type: float64
      - name: high_acuity_revenue_pct
        data_type: float64
      - name: ongoing_revenue_pct
        data_type: float64
      - name: intake_bene_pct
        data_type: float64
      - name: high_acuity_bene_pct
        data_type: float64
      - name: ongoing_bene_pct
        data_type: float64
      # ── Catchment / Leakage ──
      - name: catchment_zip_count
        data_type: int64
      - name: catchment_org_paid
        data_type: float64
      - name: catchment_total_paid
        data_type: float64
      - name: catchment_market_share_paid
        data_type: float64
      - name: catchment_leakage_paid
        data_type: float64
      - name: catchment_org_benes
        data_type: int64
      - name: catchment_total_benes
        data_type: int64
      - name: catchment_market_share_claims
        data_type: float64
      - name: catchment_leakage_claims
