  - name: org_service_line_profile_v2
    description: >
      Enriched service line profile: raw + ratios + decomposed (share of org, YoY growth)
      + benchmarked (peer P50, rate/util/panel index, rate gap in dollars).
      Grain: one row per org_slug × service_line × period_year.
    config:
      contract:
        enforced: true
    columns:
      - name: org_slug
        data_type: string
        constraints: [{ type: not_null }]
      - name: org_name
        data_type: string
        constraints: [{ type: not_null }]
      - name: org_state
        data_type: string
        constraints: [{ type: not_null }]
      - name: org_zip5
        data_type: string
        constraints: [{ type: not_null }]
      - name: org_city
        data_type: string
        constraints: [{ type: not_null }]
      - name: org_type
        data_type: string
        constraints: [{ type: not_null }]
      - name: market_tier
        data_type: string
      - name: period_year
        data_type: string
        constraints: [{ type: not_null }]
      - name: service_line
        data_type: string
        constraints: [{ type: not_null }]
      # L1: Raw
      - name: servicing_npi_count
        data_type: int64
        constraints: [{ type: not_null }]
      - name: panel_size
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_claims
        data_type: int64
        constraints: [{ type: not_null }]
      - name: total_paid
        data_type: float64
        constraints: [{ type: not_null }]
      # L2: Ratios
      - name: panel_per_clinician
        data_type: float64
      - name: claims_per_beneficiary
        data_type: float64
      - name: payment_per_claim
        data_type: float64
      - name: revenue_per_bene
        data_type: float64
      # L3: Decomposed — share of org
      - name: revenue_share_of_org
        data_type: float64
        description: "This service line's paid / org total_paid"
      - name: bene_share_of_org
        data_type: float64
        description: "This service line's benes / org total_benes"
      - name: claims_share_of_org
        data_type: float64
        description: "This service line's claims / org total_claims"
      # L3: Decomposed — growth
      - name: svc_growth_trajectory
        data_type: string
        description: "YoY revenue change: new | growing | stable | declining"
      - name: svc_revenue_growth_pct
        data_type: float64
      - name: svc_bene_growth_pct
        data_type: float64
      # L4: Benchmarked — peer context
      - name: peer_n
        data_type: int64
        description: "Number of peer orgs with this service line"
      - name: peer_p50_rate
        data_type: float64
      - name: peer_p50_util
        data_type: float64
      - name: peer_p50_panel
        data_type: float64
      # L4: Benchmarked — indexes
      - name: rate_index
        data_type: float64
        description: "org rate / peer P50 rate. >1 = above market."
      - name: util_index
        data_type: float64
        description: "org util / peer P50 util. >1 = higher frequency."
      - name: panel_index
        data_type: float64
        description: "org panel / peer P50 panel. >1 = leaner."
      - name: rate_gap_dollars
        data_type: float64
        description: "(org_rate - peer_P50) × total_claims. Positive = earning above market."
    tests:
      - unique:
          column_name: "concat(org_slug, '|', service_line, '|', period_year)"
      - not_null: { column_name: org_slug }
      - not_null: { column_name: service_line }
      - not_null: { column_name: period_year }

