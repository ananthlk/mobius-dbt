# FL Medicaid NPI sources
# - bigquery-public-data.nppes: NPI and taxonomy (no load needed)
# - landing_medicaid_npi_*: PML, TML, PPL unified by program_state and product (loaded from GCS). See docs/MEDICAID_NPI_UNIFIED_LANDING.md.

version: 2

sources:
  - name: nppes_public
    description: "BigQuery public dataset: NPPES NPI and healthcare provider taxonomy. Tables: npi_optimized, npi_raw, healthcare_provider_taxonomy_code_set_*."
    database: bigquery-public-data
    schema: nppes
    tables:
      - name: npi_optimized
        description: "Optimized NPI provider data. Use for provider lookup and NPI readiness checks."
      - name: npi_raw
        description: "Raw NPI data. Alternative to npi_optimized for full detail."

  - name: landing_medicaid_npi
    description: "Unified Medicaid NPI landing. PML, TML, PPL have program_state and product columns; pipeline uses stg_*_run models filtered by dbt vars state_code and product. Use BQ_LANDING_MEDICAID_DATASET."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_LANDING_MEDICAID_DATASET', 'landing_medicaid_npi_dev') }}"
    tables:
      - name: stg_pml
        description: "Provider Master List (unified). Enrolled Medicaid providers. Columns program_state, product; B1 uses address fields (state = service location state)."
        columns:
          - name: program_state
            description: "State/program (e.g. FL). Filter run with dbt var state_code."
          - name: product
            description: "Product (e.g. medicaid). Filter run with dbt var product."
          - name: npi
            description: "NPI number. Required for enrollment check."
          - name: contract_effective_date
            description: "Contract effective date. Use for dates_overlap(ref_date)."
          - name: contract_end_date
            description: "Contract end date. NULL = no end. Use for dates_overlap(ref_date)."
          - name: service_location_address_1
            description: "Service Location Address 1 (AHCA). Map from PML CSV column if needed."
          - name: service_location_address_zip
            description: "Service Location Address ZIP or ZIP+4 (digits). B1 uses first 5 digits. AHCA CSV: 'Service Location Address ZIP+4'."
          - name: state
            description: "Address state (service location). Used by B1; may equal program_state for single-state loads."
          - name: taxonomy_code
            description: "Provider taxonomy on file. C2: compare with NPPES primary. AHCA PML Column F."
      - name: stg_tml
        description: "Taxonomy Master List (unified). Valid Medicaid taxonomy codes per program_state and product."
        columns:
          - name: program_state
            description: "State/program (e.g. FL). Filter run with dbt var state_code."
          - name: product
            description: "Product (e.g. medicaid). Filter run with dbt var product."
          - name: taxonomy_code
            description: "Valid taxonomy code for claims."
      - name: stg_ppl
        description: "Pending Provider List (unified). Providers in enrollment pipeline per program_state and product."
        columns:
          - name: program_state
            description: "State/program (e.g. FL). Filter run with dbt var state_code."
          - name: product
            description: "Product (e.g. medicaid). Filter run with dbt var product."
          - name: npi
            description: "NPI number. Presence indicates enrollment pending."
      - name: stg_doge
        description: "DOGE Medicaid Provider Spending. View over medicaid-provider-spending with Mobius schema."
      - name: medicaid_provider_spending
        identifier: "medicaid-provider-spending"
        description: "Raw HHS Medicaid Provider Spending (direct load from Drive/Sheets). Columns: BILLING_PROVIDER_NPI_NUM, SERVICING_PROVIDER_NPI_NUM, HCPCS_CODE, etc."
      - name: stg_nucc_taxonomy
        description: "National NUCC taxonomy. Load via scripts/load_nucc_to_landing.py from seeds/nucc_taxonomy_seed.csv or full nucc_taxonomy_250.csv."
      - name: stg_roster_upload
        description: "Roster upload (cleansed). Per-upload provider list for reconciliation. Load from GCS cleansed/roster_uploads/{upload_id}/roster_resolved.csv."
        columns:
          - name: upload_id
          - name: org_name
          - name: npi_number
          - name: resolved_npi
          - name: provider_name

  - name: landing_org_profile
    description: "Org identity synced from Chat PostgreSQL (org_profile table). Run scripts/sync_org_profile_to_bq.py before dbt run."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_LANDING_MEDICAID_DATASET', 'landing_medicaid_npi_dev') }}"
    tables:
      - name: org_profile_landing
        description: "One row per org. Synced from Postgres org_profile (credentialing pipeline output)."
        columns:
          - name: org_slug
            description: "Unique org identifier (e.g. david-lawrence-center). Matches Postgres org_profile.org_slug."
          - name: org_name
            description: "Canonical display name."
          - name: org_name_aliases
            description: "JSON array of alternative names/DBA variants."
          - name: npi_count
            description: "Count of confirmed NPIs for this org."
          - name: confirmed_at
            description: "When org was first confirmed in credentialing pipeline."
          - name: confirmed_by
            description: "Who confirmed (system, user, batch-doge-discovery)."
          - name: last_refreshed_at
            description: "Last NPI refresh timestamp."
          - name: active_skills
            description: "JSON object of skill enablement status."
          - name: synced_at
            description: "When this row was synced to BQ."
      - name: org_npi_map_landing
        description: "One row per org × NPI. Flattened from org_profile.confirmed_npis JSONB."
        columns:
          - name: org_slug
            description: "Org identifier — join key to org_profile_landing."
          - name: org_name
            description: "Canonical org name (denormalized for convenience)."
          - name: npi
            description: "NPI number (string). Join to billing_npi_profiles.billing_npi or NPPES."
          - name: npi_name
            description: "Name associated with this NPI in NPPES at discovery time."
          - name: entity_type
            description: "organization or individual."
          - name: taxonomy_code
            description: "Primary taxonomy at discovery time."
          - name: source
            description: "How NPI was discovered: nppes, credentialing_run, manual."
          - name: npi_confirmed_at
            description: "When this NPI was confirmed for the org."
          - name: synced_at
            description: "When this row was synced to BQ."

  - name: financial_reference
    description: "Financial benchmarking reference tables loaded directly to BQ. AHCA-classified BH code reference for FL Medicaid."
    database: "{{ target.project }}"
    schema: "{{ env_var('BQ_MARTS_FINANCIAL_DATASET', 'mobius_financial_dev') }}"
    tables:
      - name: fl_bh_code_reference
        description: "AHCA-classified FL Medicaid behavioral health HCPCS codes. 70 codes across 15 categories. Excludes personal care/HCBS (T1019/T1025) and behavior analysis (97151-97158). Source of truth for BH service line classification."
        columns:
          - name: ahca_category
            description: "AHCA service category: Assessment, Community Support, Crisis/Screening, FACT, MH Rehab/Day Treatment, Medical/Psychiatric, Other BH Support, Practitioner Therapy, Psych Testing, Psychiatric Evaluation, Psychosocial Rehab (TBOS), Substance Use Disorder, Targeted Case Management, Telehealth MH, Treatment Planning"
          - name: hcpcs_code
            description: "HCPCS/CPT procedure code"
          - name: description
            description: "Human-readable code description"
