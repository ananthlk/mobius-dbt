# MOBIUS-DBT BigQuery profile
# Project-based isolation: each project (dev/staging/prod) has same dataset names (landing_rag, mobius_rag).
# Set BQ_PROJECT per env. BQ_DATASET and BQ_LANDING_DATASET are always landing_rag and mobius_rag.
# Auth: gcloud auth application-default login or GOOGLE_APPLICATION_CREDENTIALS

mobius_dbt:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('BQ_PROJECT', 'mobius-os-dev') }}"
      dataset: "{{ env_var('BQ_DATASET', 'mobius_rag') }}"
      threads: 4
      timeout_seconds: 1800
    staging:
      type: bigquery
      method: oauth
      project: "{{ env_var('BQ_PROJECT', 'mobius-staging-mobius') }}"
      dataset: "{{ env_var('BQ_DATASET', 'mobius_rag') }}"
      threads: 4
      timeout_seconds: 1800
    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('BQ_PROJECT', 'mobiusos-new') }}"
      dataset: "{{ env_var('BQ_DATASET', 'mobius_rag') }}"
      threads: 4
      timeout_seconds: 1800
